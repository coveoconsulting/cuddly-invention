<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2e7d5b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/onlet.png" />
    <link rel="apple-touch-icon" href="/onlet.png" />
    <title>Coveo consulting — CRM</title>
    <meta name="description" content="CRM force commerciale terrain : comptes, visites, pipeline, commandes." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (reg) { reg.unregister().catch(function () {}); });
          }).catch(function () {});
          if (window.caches && caches.keys) {
            caches.keys().then(function (keys) {
              keys.forEach(function (key) { caches.delete(key).catch(function () {}); });
            }).catch(function () {});
          }
        });
      }
    </script>
  </body>
</html>
